<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

  <body class="d-flex-row">
    <div class="container d-flex-col">
      <header class="d-flex-col-sb-c">
        <div class="title d-flex-col-c-fs">
          <h2>Classic Cheesecake Recipe</h2>
          <div class="description-container d-flex-row-fs-fs">
            <img src="./assets/img/6dots.svg" alt="dots" />

              Look no further for a creamy and ultra smooth classic cheesecake

        </div>
        <div class="recipe-img d-flex-row-c-c">
          <img src="./assets/img/photo1.png" alt="classic cheesecake" />

      <main class="d-flex-col">Main</main>
